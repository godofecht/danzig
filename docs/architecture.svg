<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#43e97b"/>
      <stop offset="100%" stop-color="#38f9d7"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#764ba2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="1400" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="550" y="45" text-anchor="middle" font-size="28" font-weight="700" fill="#333">Danzig Architecture</text>
  <text x="550" y="70" text-anchor="middle" font-size="14" fill="#888">Pure Zig VST3 Plugin Framework — Zero Dependencies</text>

  <!-- ═══════════ DAW HOST ═══════════ -->
  <rect x="50" y="95" width="1000" height="55" rx="10" fill="url(#purple)" filter="url(#shadow)"/>
  <text x="550" y="128" text-anchor="middle" font-size="18" font-weight="600" fill="white">DAW Host (Ableton, Logic, REAPER, etc.)</text>

  <!-- Arrow down -->
  <line x1="550" y1="150" x2="550" y2="180" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="565" y="172" font-size="11" fill="#888">GetPluginFactory()</text>

  <!-- ═══════════ FACTORY ═══════════ -->
  <rect x="300" y="185" width="500" height="70" rx="10" fill="white" stroke="#667eea" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="210" text-anchor="middle" font-size="15" font-weight="600" fill="#333">IPluginFactory / IPluginFactory2</text>
  <text x="550" y="230" text-anchor="middle" font-size="12" fill="#888">countClasses() · getClassInfo() · createInstance()</text>
  <text x="550" y="246" text-anchor="middle" font-size="11" fill="#999">Vendor: Quilio · Category: "Audio Module Class" · SubCat: "Fx"</text>

  <!-- Arrow down -->
  <line x1="550" y1="255" x2="550" y2="290" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="565" y="278" font-size="11" fill="#888">createInstance(CID)</text>

  <!-- ═══════════ COMPONENT (main block) ═══════════ -->
  <rect x="80" y="295" width="940" height="280" rx="12" fill="white" stroke="#764ba2" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="550" y="320" text-anchor="middle" font-size="17" font-weight="700" fill="#764ba2">Component (extern struct — COM Multiple Inheritance)</text>

  <!-- Three vtable boxes inside -->
  <!-- IComponent -->
  <rect x="105" y="335" width="280" height="90" rx="8" fill="#f0f4ff" stroke="#667eea" stroke-width="1.5"/>
  <text x="245" y="357" text-anchor="middle" font-size="13" font-weight="600" fill="#667eea">IComponent vtbl</text>
  <text x="245" y="375" text-anchor="middle" font-size="10" fill="#666">initialize · terminate</text>
  <text x="245" y="390" text-anchor="middle" font-size="10" fill="#666">getBusCount · getBusInfo</text>
  <text x="245" y="405" text-anchor="middle" font-size="10" fill="#666">setActive · setState/getState</text>

  <!-- IAudioProcessor -->
  <rect x="410" y="335" width="280" height="90" rx="8" fill="#f0fff4" stroke="#43e97b" stroke-width="1.5"/>
  <text x="550" y="357" text-anchor="middle" font-size="13" font-weight="600" fill="#2d8a4e">IAudioProcessor vtbl</text>
  <text x="550" y="375" text-anchor="middle" font-size="10" fill="#666">setupProcessing · setProcessing</text>
  <text x="550" y="390" text-anchor="middle" font-size="10" fill="#666">process(ProcessData*)</text>
  <text x="550" y="405" text-anchor="middle" font-size="10" fill="#666">getBusArrangement · canProcessSampleSize</text>

  <!-- IEditController -->
  <rect x="715" y="335" width="280" height="90" rx="8" fill="#fff5f5" stroke="#f5576c" stroke-width="1.5"/>
  <text x="855" y="357" text-anchor="middle" font-size="13" font-weight="600" fill="#f5576c">IEditController vtbl</text>
  <text x="855" y="375" text-anchor="middle" font-size="10" fill="#666">getParameterCount · getParameterInfo</text>
  <text x="855" y="390" text-anchor="middle" font-size="10" fill="#666">setParamNormalized · getParamNormalized</text>
  <text x="855" y="405" text-anchor="middle" font-size="10" fill="#666">createView("editor") → IPluginView</text>

  <!-- Shared state -->
  <rect x="105" y="440" width="890" height="55" rx="8" fill="#faf5ff" stroke="#764ba2" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="550" y="460" text-anchor="middle" font-size="12" font-weight="600" fill="#764ba2">Shared State (extern struct fields)</text>
  <text x="550" y="478" text-anchor="middle" font-size="11" fill="#666">sample_rate: f64 · active: u8 · processing: u8 · store: *ParamStore(2)</text>

  <!-- Pointer math note -->
  <text x="550" y="562" text-anchor="middle" font-size="10" fill="#999">COM interface pointers resolved via @offsetOf — guaranteed by extern struct layout</text>

  <!-- ═══════════ ATOMIC PARAM STORE ═══════════ -->
  <line x1="550" y1="575" x2="550" y2="610" stroke="#764ba2" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <rect x="150" y="615" width="800" height="170" rx="12" fill="white" stroke="#f093fb" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="550" y="642" text-anchor="middle" font-size="17" font-weight="700" fill="#c44569">Lock-Free Atomic Parameter Store</text>
  <text x="550" y="660" text-anchor="middle" font-size="11" fill="#888">ParamStore(2) — Fixed-size, zero-heap, cache-line aligned</text>

  <!-- Two param boxes -->
  <rect x="180" y="675" width="350" height="85" rx="8" fill="#fff0f6" stroke="#f093fb" stroke-width="1.5"/>
  <text x="355" y="697" text-anchor="middle" font-size="13" font-weight="600" fill="#c44569">AtomicParam[0]: Gain</text>
  <text x="355" y="715" text-anchor="middle" font-size="10" fill="#666">range: -48 to +48 dB · default: 0.5 (0 dB)</text>
  <text x="355" y="730" text-anchor="middle" font-size="10" fill="#666">raw: atomic u32 (normalized f32)</text>
  <text x="355" y="745" text-anchor="middle" font-size="10" fill="#666">smoothed: f32 · smooth_coeff: exp(-1000/(5ms*sr))</text>

  <rect x="570" y="675" width="350" height="85" rx="8" fill="#fff0f6" stroke="#f093fb" stroke-width="1.5"/>
  <text x="745" y="697" text-anchor="middle" font-size="13" font-weight="600" fill="#c44569">AtomicParam[1]: Bypass</text>
  <text x="745" y="715" text-anchor="middle" font-size="10" fill="#666">range: 0 to 1 · default: 0.0 (off)</text>
  <text x="745" y="730" text-anchor="middle" font-size="10" fill="#666">raw: atomic u32 (normalized f32)</text>
  <text x="745" y="745" text-anchor="middle" font-size="10" fill="#666">no smoothing · read directly via getNormalized()</text>

  <!-- 64-byte note -->
  <text x="550" y="775" text-anchor="middle" font-size="10" font-weight="500" fill="#c44569">Each AtomicParam = exactly 64 bytes (1 cache line) — no false sharing</text>

  <!-- ═══════════ THREAD DIAGRAM ═══════════ -->
  <line x1="550" y1="785" x2="550" y2="815" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Two columns: Host Thread and Audio Thread -->
  <rect x="80" y="820" width="440" height="155" rx="10" fill="white" stroke="#4facfe" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="845" text-anchor="middle" font-size="15" font-weight="600" fill="#1a73e8">Host / UI Thread</text>
  <text x="300" y="870" text-anchor="middle" font-size="11" fill="#666">setParamNormalized(id, value)</text>
  <text x="300" y="888" text-anchor="middle" font-size="11" fill="#666">↓</text>
  <text x="300" y="906" text-anchor="middle" font-size="11" font-weight="600" fill="#1a73e8">store.setNormalized(id, value)</text>
  <text x="300" y="924" text-anchor="middle" font-size="11" fill="#666">↓</text>
  <text x="300" y="942" text-anchor="middle" font-size="11" fill="#666">atomic store (release semantics)</text>
  <text x="300" y="960" text-anchor="middle" font-size="10" font-weight="500" fill="#4facfe">WAIT-FREE · O(1) · NO LOCKS</text>

  <rect x="580" y="820" width="440" height="155" rx="10" fill="white" stroke="#43e97b" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="845" text-anchor="middle" font-size="15" font-weight="600" fill="#2d8a4e">Audio Thread (Real-Time)</text>
  <text x="800" y="870" text-anchor="middle" font-size="11" fill="#666">readParamChanges(store, host_changes)</text>
  <text x="800" y="888" text-anchor="middle" font-size="11" fill="#666">↓</text>
  <text x="800" y="906" text-anchor="middle" font-size="11" font-weight="600" fill="#2d8a4e">store.tick(Param.Gain) per sample</text>
  <text x="800" y="924" text-anchor="middle" font-size="11" fill="#666">atomic load → exponential smooth → dBToLinear()</text>
  <text x="800" y="942" text-anchor="middle" font-size="11" fill="#666">out[ch][s] = in[ch][s] * gain_linear</text>
  <text x="800" y="960" text-anchor="middle" font-size="10" font-weight="500" fill="#43e97b">LOCK-FREE · ZERO ALLOC · CACHE-FRIENDLY</text>

  <!-- Atomic arrow between threads -->
  <line x1="520" y1="905" x2="580" y2="905" stroke="#f5576c" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="550" y="898" text-anchor="middle" font-size="9" font-weight="600" fill="#f5576c">atomic</text>

  <!-- ═══════════ DSP KERNEL ═══════════ -->
  <line x1="800" y1="975" x2="800" y2="1010" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="580" y="1015" width="440" height="80" rx="10" fill="url(#green)" filter="url(#shadow)"/>
  <text x="800" y="1043" text-anchor="middle" font-size="15" font-weight="700" fill="white">DSP Kernel</text>
  <text x="800" y="1063" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.9)">gain_db = store.tick(0) → dBToLinear()</text>
  <text x="800" y="1080" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.9)">out[ch][s] = in[ch][s] × gain_linear</text>

  <!-- ═══════════ UI / WEBVIEW ═══════════ -->
  <line x1="300" y1="975" x2="300" y2="1010" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="80" y="1015" width="440" height="130" rx="10" fill="white" stroke="#667eea" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="1040" text-anchor="middle" font-size="15" font-weight="600" fill="#667eea">IPluginView (WebView UI)</text>
  <text x="300" y="1062" text-anchor="middle" font-size="11" fill="#666">WKWebView created via ObjC runtime (dlsym)</text>
  <text x="300" y="1080" text-anchor="middle" font-size="11" fill="#666">HTML/CSS/JS embedded at compile time (@embedFile)</text>
  <text x="300" y="1098" text-anchor="middle" font-size="11" fill="#666">Attached to host NSView · 600×500 fixed size</text>
  <text x="300" y="1116" text-anchor="middle" font-size="11" fill="#666">Gain slider · Bypass · Waveform visualization</text>
  <text x="300" y="1134" text-anchor="middle" font-size="10" fill="#999">Settings panel: CoreAudio device enum · sample rate · buffer size</text>

  <!-- ═══════════ SOURCE FILES ═══════════ -->
  <rect x="80" y="1175" width="940" height="115" rx="10" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <text x="550" y="1198" text-anchor="middle" font-size="14" font-weight="600" fill="#555">Source Modules (src/)</text>

  <rect x="105" y="1210" width="200" height="35" rx="6" fill="#f0f4ff" stroke="#667eea" stroke-width="1"/>
  <text x="205" y="1232" text-anchor="middle" font-size="11" font-weight="500" fill="#667eea">vst3.zig — C ABI types</text>

  <rect x="325" y="1210" width="200" height="35" rx="6" fill="#f0fff4" stroke="#43e97b" stroke-width="1"/>
  <text x="425" y="1232" text-anchor="middle" font-size="11" font-weight="500" fill="#2d8a4e">audio.zig — DSP utils</text>

  <rect x="545" y="1210" width="200" height="35" rx="6" fill="#fff0f6" stroke="#f093fb" stroke-width="1"/>
  <text x="645" y="1232" text-anchor="middle" font-size="11" font-weight="500" fill="#c44569">params.zig — Atomics</text>

  <rect x="765" y="1210" width="230" height="35" rx="6" fill="#fff5f5" stroke="#f5576c" stroke-width="1"/>
  <text x="880" y="1232" text-anchor="middle" font-size="11" font-weight="500" fill="#f5576c">plugin.zig — Base types</text>

  <text x="550" y="1272" text-anchor="middle" font-size="11" fill="#888">root.zig re-exports all modules · Universal binary: arm64 + x86_64 via lipo</text>

  <!-- ═══════════ BUILD TARGETS ═══════════ -->
  <rect x="80" y="1305" width="210" height="40" rx="8" fill="url(#purple)" filter="url(#shadow)"/>
  <text x="185" y="1330" text-anchor="middle" font-size="12" font-weight="600" fill="white">zig build vst3</text>

  <rect x="310" y="1305" width="210" height="40" rx="8" fill="url(#blue)" filter="url(#shadow)"/>
  <text x="415" y="1330" text-anchor="middle" font-size="12" font-weight="600" fill="white">zig build run-gui</text>

  <rect x="540" y="1305" width="210" height="40" rx="8" fill="url(#green)" filter="url(#shadow)"/>
  <text x="645" y="1330" text-anchor="middle" font-size="12" font-weight="600" fill="white">zig build test</text>

  <rect x="770" y="1305" width="250" height="40" rx="8" fill="url(#orange)" filter="url(#shadow)"/>
  <text x="895" y="1330" text-anchor="middle" font-size="12" font-weight="600" fill="white">zig build run-standalone</text>

  <!-- Footer -->
  <text x="550" y="1385" text-anchor="middle" font-size="11" fill="#aaa">github.com/godofecht/danzig · Quilio · Pure Zig · Zero Dependencies</text>
</svg>
