name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      # Zig cannot find libSystem on the macOS runners by itself. Without this
      # even the build runner fails to link, with every libc symbol undefined:
      #   error: undefined symbol: _malloc_size
      #   note: referenced by .../build.o:_posix.abort
      - name: Point Zig at the macOS SDK
        run: echo "SDKROOT=$(xcrun --show-sdk-path)" >> "$GITHUB_ENV"

      - name: Build
        run: zig build

      # Drives the built plugin through the raw VST3 C ABI.
      - name: Test
        run: zig build test
